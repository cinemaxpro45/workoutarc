<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Arc">
<meta name="theme-color" content="#F5F6F8">
<meta name="description" content="Arc — carnet d'entraînement premium : suivi série par série, génération de séances et statistiques.">
<title>Arc</title>

<link rel="manifest" href="manifest.webmanifest">

<!-- Typographie : Plus Jakarta Sans (variable). Voir README pour passer à Satoshi self-hosted. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400..700&display=swap">

<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header class="top" id="top">
    <div class="top-row">
      <div class="brand">
        <span class="logo" id="logo"></span>
        <div class="brand-tx"><div class="bt">Arc</div><div class="bs" id="brand-sub">Ton entraînement</div></div>
      </div>
      <button class="icon-btn" id="btn-settings" aria-label="Réglages"></button>
    </div>
    <div id="hdr"></div>
  </header>
  <main id="main"></main>
  <nav class="bnav" id="nav"></nav>
</div>

<!-- Wheel picker sheet -->
<div class="sheet-bg" id="pick-bg"></div>
<div class="sheet pick" id="pick">
  <div class="grip"></div>
  <div class="pick-head"><div class="pick-title" id="pick-title">Série</div><div class="pick-sub" id="pick-sub"></div></div>
  <div class="pick-wheels" id="pick-wheels"></div>
  <button class="btn" id="pick-ok">Confirmer</button>
</div>

<!-- Generic sheet -->
<div class="sheet-bg" id="sheet-bg"></div>
<div class="sheet" id="sheet"><div class="grip"></div><div id="sheet-c"></div></div>

<div class="ac" id="ac"></div>
<div class="toast" id="toast"></div>
<canvas id="confetti"></canvas>

<script src="app.js"></script>
</body>
</html>
